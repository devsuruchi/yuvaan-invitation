<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuvaan's Annaprashan Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@700&family=Cinzel:wght@600&family=Marcellus&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-red: #b32d2e;
            --name-green: #2d5a27;
            --gold: #d4af37;
            --sky-blue: #e0f2f7;
        }

        body {
            background-color: #333;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Marcellus', serif;
        }

        /* Main Card Container */
        .card {
            width: 500px;
            height: 750px;
            background: var(--sky-blue);
            background-image: linear-gradient(to bottom, rgba(255,255,255,0.4), transparent), 
                              url('https://www.transparenttextures.com/patterns/watercolor-paper.png');
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 5px solid white;
        }

        /* Top Marigold Garland (Toran) */
        .garland {
            position: absolute;
            top: 0;
            width: 100%;
            height: 100px;
            background: url('https://i.imgur.com/3Z6pX7P.png') repeat-x; /* Mock garland or CSS shapes */
            background-size: contain;
            z-index: 10;
        }

        /* Mimicking the garland with CSS shapes */
        .marigold-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding-top: 5px;
        }
        .flower {
            width: 30px;
            height: 30px;
            background: orange;
            border-radius: 50%;
            box-shadow: 0 3px 0 red, 0 6px 0 orange;
            position: relative;
        }
        .flower::after {
            content: "🍃";
            position: absolute;
            bottom: -15px;
            left: 5px;
            font-size: 12px;
        }

        /* Host Names */
        .hosts {
            margin-top: 80px;
            color: var(--text-red);
            font-size: 22px;
            font-weight: bold;
            text-align: center;
        }

        .solicit {
            text-align: center;
            font-size: 13px;
            letter-spacing: 1px;
            color: #444;
            margin-top: 10px;
            text-transform: uppercase;
        }

        /* Child's Name (Artistic Script) */
        .child-name {
            font-family: 'Great Vibes', cursive;
            color: var(--name-green);
            font-size: 65px;
            text-align: center;
            margin: 5px 0;
            position: relative;
        }
        .child-name::after {
            content: "'s";
            font-family: 'Marcellus', serif;
            font-size: 24px;
            vertical-align: middle;
        }

        .ceremony-title {
            font-family: 'Cinzel', serif;
            color: var(--text-red);
            font-size: 28px;
            text-align: center;
            letter-spacing: 1px;
        }

        /* Date Section with Gold Dividers */
        .date-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
            color: var(--text-red);
        }
        .date-main {
            font-size: 32px;
            font-weight: bold;
            border-left: 3px double var(--gold);
            border-right: 3px double var(--gold);
            padding: 0 15px;
        }
        .date-sub {
            font-size: 18px;
            font-weight: bold;
        }

        /* Location and Time Info */
        .info {
            text-align: left;
            margin-left: 40px;
            width: 200px; /* Constrained to left side */
            margin-top: 20px;
            color: var(--text-red);
            line-height: 1.4;
        }

        .time {
            font-size: 22px;
            font-weight: bold;
        }

        .location {
            font-size: 14px;
            color: #333;
            font-weight: bold;
            margin-top: 10px;
        }

        /* Yuvaan's Image (Placed like the baby in the ref) */
        .yuvaan-img {
            position: absolute;
            bottom: 40px;
            right: -20px;
            width: 320px;
            height: 420px;
            z-index: 5;
        }
        .yuvaan-img img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            /* Applying a slight soft edge mask like the reference */
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
        }

        /* Rice Bowl (Lower Left) */
        .rice-bowl {
            position: absolute;
            bottom: 30px;
            left: 20px;
            width: 180px;
        }

        /* Background Temple Elements (Watermark style) */
        .temple-bg {
            position: absolute;
            bottom: 50px;
            left: -20px;
            width: 100%;
            opacity: 0.1;
            z-index: 1;
        }

        .footer-rsvp {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 12px;
            font-weight: bold;
            color: var(--text-red);
        }

    </style>
</head>
<body>

    <div class="card">
        <!-- Garland -->
        <div class="marigold-row">
            <div class="flower"></div><div class="flower"></div><div class="flower"></div>
            <div class="flower"></div><div class="flower"></div><div class="flower"></div>
            <div class="flower"></div><div class="flower"></div><div class="flower"></div>
            <div class="flower"></div><div class="flower"></div><div class="flower"></div>
        </div>

        <!-- Text Section -->
        <div class="hosts">Kunal Chaudhary & Suruchi Dev</div>
        <div class="solicit">Solicit your presence at the<br>auspicious occasion of their little son</div>
        
        <div class="child-name">Yuvaan</div>
        <div class="ceremony-title">ANNAPRASHAN CEREMONY</div>

        <div class="date-container">
            <div class="date-sub">7 BAISAKH</div>
            <div class="date-main">2083</div>
            <div class="date-sub">2026</div>
        </div>
        <div style="text-align:center; color: var(--text-red); font-weight:bold;">MONDAY</div>

        <div class="info">
            <div class="time">4 PM onwards</div>
            <div style="font-size: 14px; font-weight: bold;">Followed by Dinner</div>
            
            <div class="location">
                At<br>
                Our Residence,<br>
                Jorpati, Kathmandu<br>
                Nepal
            </div>
        </div>

        <!-- Decorative Temple (Watermark) -->
        <img src="https://i.imgur.com/K53M82p.png" class="temple-bg">

        <!-- Son's Picture -->
        <div class="yuvaan-img">
            <!-- Ensure yuvaan_pp.jpg is in the same folder -->
            <img src="yuvaan_pp.jpg" alt="Yuvaan">
        </div>

        <!-- Rice Bowl Illustration -->
        <div class="rice-bowl">
            <img src="https://i.imgur.com/6X2f7pU.png" style="width:100%;" alt="Traditional Bowl">
        </div>

        <div class="footer-rsvp">
            RSVP: +977-9860332358
        </div>
    </div>

</body>
</html>
