<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuvaan's Subha Annaprashan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;700;800&family=Kalam:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --maroon: #7b0000;
            --gold: #d4af37;
            --cream: #fff9e6;
        }

        body {
            background: #2c0101; /* Deep background to make the card pop */
            font-family: 'Mukta', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* The Invitation Card (9:16 Ratio) */
        .card {
            background: var(--cream);
            width: 380px;
            height: 640px;
            border: 12px double var(--gold);
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            border-radius: 10px;
            overflow: hidden;
            animation: card-entry 1.5s ease-out;
        }

        @keyframes card-entry {
            0% { transform: scale(0.8) rotate(-5deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        /* Traditional Header Border */
        .header-decor {
            height: 40px;
            background: var(--maroon);
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            color: var(--gold);
        }

        .gold-text {
            color: var(--gold);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; transform: scale(1.05); }
        }

        /* 84 Byanjan Graphic Representation */
        .feast-area {
            position: relative;
            height: 220px;
            margin-top: 20px;
        }

        .tapari {
            position: absolute;
            width: 14px;
            height: 10px;
            background: #2d5a27; /* Leaf Green */
            border-radius: 50% 50% 10% 10%;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            animation: pulse-food 2s infinite;
        }

        @keyframes pulse-food {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Baby Graphic Animation */
        .baby-character {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 4rem;
            z-index: 10;
            animation: baby-eat 2s infinite;
        }

        @keyframes baby-eat {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-10px) rotate(5deg); }
        }

        /* Sayapatri Flowers (Falling GIF effect) */
        .flower {
            position: absolute;
            color: orange;
            font-size: 20px;
            z-index: 5;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { top: -50px; transform: rotate(0); }
            100% { top: 700px; transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Animation Layer for Flowers -->
    <div id="flower-container"></div>

    <!-- MAIN CARD -->
    <div class="card flex flex-col items-center">
        
        <!-- Top Banner -->
        <div class="header-decor">
            <span>⚜</span><span>⚜</span><span>⚜</span><span>⚜</span><span>⚜</span>
        </div>

        <!-- Subha Annaprashan Header -->
        <h1 class="text-4xl font-extrabold mt-6 text-[#7b0000] gold-text">
            शुभ अन्नप्राशन
        </h1>
        <p class="font-['Kalam'] text-[#d4af37] text-lg -mt-1 font-bold">Yuvaan's First Feast</p>

        <!-- YUVAAN'S PICTURE IN LOCKET FRAME -->
        <div class="relative mt-6">
            <div class="w-40 h-40 rounded-full border-8 border-[#d4af37] p-1 shadow-xl overflow-hidden bg-white">
                <img src="yuvaan_pp.jpg" alt="Yuvaan" class="w-full h-full object-cover" onerror="this.src='https://api.dicebear.com/7.x/pixel-art/svg?seed=Yuvaan';">
            </div>
            <!-- Traditional Tikka/Decor on frame -->
            <div class="absolute -top-2 left-1/2 -translate-x-1/2 bg-red-600 w-4 h-4 rounded-full border-2 border-white"></div>
        </div>

        <!-- 84 BYANJAN & BABY GRAPHIC AREA -->
        <div class="feast-area w-full">
            <!-- JavaScript will inject 84 taparis here -->
            <div id="tapari-orbit" class="relative w-full h-full"></div>
            
            <!-- Baby Character Graphic -->
            <div class="baby-character">👶</div>
            <div class="absolute bottom-2 left-1/2 -translate-x-1/2 text-4xl">🥘</div>
        </div>

        <!-- DETAILS SECTION -->
        <div class="mt-4 text-center px-6">
            <div class="bg-[#7b0000] text-[#d4af37] py-3 px-8 rounded-lg shadow-inner">
                <p class="text-xs uppercase tracking-widest font-bold text-white mb-1">Join us at Jorpati</p>
                <h2 class="text-xl font-black">7 Baisakh 2083</h2>
                <p class="text-sm font-bold opacity-90">20th April 2026</p>
            </div>
            
            <p class="mt-6 text-[#7b0000] text-xs italic px-4 font-bold">
                "Small hands, big appetite! Join us as our 5-month-old prince Yuvaan tastes the 84 varieties of tradition."
            </p>
        </div>

        <!-- RSVP -->
        <div class="absolute bottom-6 w-full text-center">
            <div class="h-px bg-[#d4af37] w-2/3 mx-auto mb-2"></div>
            <p class="text-[10px] text-[#7b0000] font-bold uppercase tracking-tighter">Blessings from: The [Your Last Name] Family</p>
        </div>

    </div>

    <script>
        // 1. Generate 84 Taparis (Leaf Bowls) in a semi-circle around the baby
        const container = document.getElementById('tapari-orbit');
        const foods = ['#fde047', '#f97316', '#ffffff', '#ef4444', '#22c55e'];
        
        for (let i = 0; i < 84; i++) {
            const tapari = document.createElement('div');
            tapari.className = 'tapari';
            
            // Positioning 84 bowls in a dynamic layout
            const angle = (i / 84) * 360;
            const radiusX = 140; 
            const radiusY = 80;
            const x = 190 + radiusX * Math.cos(angle * Math.PI / 180) - 7;
            const y = 100 + radiusY * Math.sin(angle * Math.PI / 180) - 5;
            
            tapari.style.left = `${x}px`;
            tapari.style.top = `${y}px`;
            
            // Random food color inside tapari
            const food = document.createElement('div');
            food.style.width = '70%';
            food.style.height = '70%';
            food.style.margin = '15% auto';
            food.style.borderRadius = '50%';
            food.style.backgroundColor = foods[i % foods.length];
            tapari.appendChild(food);

            // Staggered animation delay
            tapari.style.animationDelay = (i * 0.05) + 's';
            
            container.appendChild(tapari);
        }

        // 2. Falling Sayapatri Flower Petals (GIF effect)
        const flowerContainer = document.getElementById('flower-container');
        function createFlower() {
            const f = document.createElement('div');
            f.className = 'flower';
            f.innerHTML = '✿';
            f.style.left = Math.random() * 100 + 'vw';
            f.style.animationDuration = (Math.random() * 3 + 2) + 's';
            f.style.opacity = Math.random();
            flowerContainer.appendChild(f);
            setTimeout(() => f.remove(), 5000);
        }
        setInterval(createFlower, 400);
    </script>
</body>
</html>
