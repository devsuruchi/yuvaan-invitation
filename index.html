<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuvaan's Annaprashan Invite</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@600&family=Playfair+Display:wght@700&family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-red: #a32a2a;
            --leaf-green: #2e5a31;
            --gold: #d4af37;
            --sky-blue: #e0f4f7;
        }

        body {
            background-color: #333;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
        }

        .card {
            width: 500px;
            height: 780px;
            background: var(--sky-blue);
            /* Watercolor & Flowery Background mix */
            background-image: 
                linear-gradient(to bottom, rgba(224, 244, 247, 0.7), rgba(224, 244, 247, 0.9)),
                url('https://www.transparenttextures.com/patterns/watercolor-paper.png'),
                url('https://i.imgur.com/8Y0S09b.png'); /* Corner flower overlay */
            background-size: cover;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 6px solid white;
        }

        /* Top & Side Marigold Garlands */
        .garland-top {
            position: absolute;
            top: 0;
            width: 100%;
            height: 80px;
            background: url('https://i.imgur.com/3Z6pX7P.png') repeat-x; /* Top horizontal string */
            background-size: contain;
            z-index: 10;
        }

        .garland-pillar {
            position: absolute;
            top: 0;
            width: 40px;
            height: 250px;
            background: url('https://i.imgur.com/lZ2S4S6.png') repeat-y; /* Vertical side strings */
            background-size: contain;
            z-index: 10;
        }
        .left-pillar { left: 10px; }
        .right-pillar { right: 10px; }

        .content {
            padding-top: 90px;
            text-align: center;
            position: relative;
            z-index: 5;
        }

        .parents {
            color: var(--dark-red);
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .solicit {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #444;
            line-height: 1.5;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .baby-name-box {
            position: relative;
            display: inline-block;
        }

        .baby-name {
            font-family: 'Great Vibes', cursive;
            color: var(--leaf-green);
            font-size: 85px;
            margin: 0;
        }

        .annaprashan-title {
            font-family: 'Cinzel', serif;
            color: var(--dark-red);
            font-size: 28px;
            letter-spacing: 1px;
            margin-top: -15px;
        }

        /* The Exact Date Box from Image */
        .date-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 25px;
            font-weight: 700;
        }

        .month-year {
            font-size: 24px;
            color: #222;
        }

        .day-box {
            font-size: 32px;
            color: var(--dark-red);
            padding: 0 20px;
            border-left: 3px double var(--gold);
            border-right: 3px double var(--gold);
            position: relative;
        }

        .details-text {
            margin-top: 20px;
            color: #000;
            font-size: 20px;
            font-weight: 700;
            line-height: 1.4;
        }

        .location {
            margin-top: 40px;
            font-size: 16px;
            color: #333;
            width: 250px;
            margin-left: 40px;
            text-align: center;
            line-height: 1.4;
        }

        /* The Baby's Image (Yuvaan) */
        .yuvaan-img {
            position: absolute;
            bottom: 30px;
            right: -20px;
            width: 330px;
            height: 450px;
            z-index: 4;
        }

        .yuvaan-img img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            /* Fading the bottom of the photo into the card */
            -webkit-mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
            mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
        }

        /* Large Lotus behind the baby */
        .lotus {
            position: absolute;
            bottom: 120px;
            right: 0px;
            width: 200px;
            opacity: 0.6;
            z-index: 3;
        }

        /* Silver Thali / Rice Bowl */
        .thali {
            position: absolute;
            bottom: 20px;
            left: 15px;
            width: 200px;
            z-index: 6;
        }

        .temple-bg {
            position: absolute;
            bottom: 150px;
            left: 0;
            width: 100%;
            opacity: 0.15;
            z-index: 1;
        }

        .rsvp {
            position: absolute;
            bottom: 15px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            color: var(--dark-red);
            z-index: 10;
        }

    </style>
</head>
<body>

    <div class="card">
        <!-- Decorations -->
        <div class="garland-top"></div>
        <div class="garland-pillar left-pillar"></div>
        <div class="garland-pillar right-pillar"></div>
        <img src="https://i.imgur.com/K53M82p.png" class="temple-bg" alt="temple">
        <img src="https://i.imgur.com/89k6S3i.png" class="lotus" alt="lotus">

        <div class="content">
            <div class="parents">Kunal Chaudhary & Suruchi Dev</div>
            <div class="solicit">
                SOLICIT YOUR PRESENCE AT THE<br>
                AUSPICIOUS OCCASION OF THEIR LITTLE SON
            </div>
            
            <div class="baby-name-box">
                <p class="baby-name">Yuvaan's</p>
            </div>

            <div class="annaprashan-title">SUBH ANNAPRASHAN CEREMONY</div>

            <!-- Date Box -->
            <div class="date-row">
                <span class="month-year">Baisakh</span>
                <span class="day-box">7TH</span>
                <span class="month-year">2083</span>
            </div>

            <!-- Time & Info -->
            <div class="details-text">
                20 April 2026<br>
                4 PM onwards<br>
                <span style="font-size: 16px;">Followed by dinner</span>
            </div>

            <!-- Location -->
            <div class="location">
                At<br>
                Our Own Residence,<br>
                Jorpati, Kathmandu,<br>
                Nepal.
            </div>
        </div>

        <!-- The Main Picture of Yuvaan -->
        <div class="yuvaan-img">
            <img src="yuvaan_pp.jpg" alt="Yuvaan">
        </div>

        <!-- Rice Bowl Illustration -->
        <div class="thali">
            <img src="https://i.imgur.com/6X2f7pU.png" style="width:100%;" alt="Rice Bowl Thali">
        </div>

        <div class="rsvp">
            RSVP: +977-9860332358
        </div>
    </div>

</body>
</html>
