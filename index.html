<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuvaan's Flowery Pasni Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --floral-pink: #f8bbd0;
            --leaf-green: #2d5a27;
            --deep-red: #b32d2e;
            --soft-cream: #fffaf0;
            --gold: #d4af37;
        }

        body {
            background-color: #f0f0f0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
        }

        .card {
            width: 450px;
            height: 720px;
            background-color: var(--soft-cream);
            /* Flowery Background Pattern */
            background-image: 
                linear-gradient(rgba(255, 250, 240, 0.8), rgba(255, 250, 240, 0.8)),
                url('https://www.transparenttextures.com/patterns/floral-paper.png');
            position: relative;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            border: 12px solid white;
            outline: 1px solid #ddd;
            overflow: hidden;
            text-align: center;
        }

        /* Flower Corner Decorations */
        .corner-flower {
            position: absolute;
            width: 150px;
            height: 150px;
            z-index: 1;
            opacity: 0.8;
        }
        .top-left { top: -20px; left: -20px; transform: rotate(0deg); }
        .top-right { top: -20px; right: -20px; transform: rotate(90deg); }
        .bottom-left { bottom: -20px; left: -20px; transform: rotate(-90deg); }
        .bottom-right { bottom: -20px; right: -20px; transform: rotate(180deg); }

        .header {
            margin-top: 50px;
            position: relative;
            z-index: 2;
        }

        .parents-name {
            color: var(--leaf-green);
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .ceremony-title {
            font-family: 'Playfair Display', serif;
            color: var(--deep-red);
            font-size: 26px;
            margin-top: 10px;
            letter-spacing: 2px;
        }

        /* Flowery Wreath Frame for Photo */
        .photo-wreath {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 30px auto;
            z-index: 2;
        }

        .wreath-border {
            position: absolute;
            top: -10px;
            left: -10px;
            width: 240px;
            height: 240px;
            border: 4px double var(--gold);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Adding decorative dots/flowers around wreath */
        .wreath-border::after {
            content: "✿ 🌸 ✿ 🌺 ✿ 🌸 ✿ 🌺 ✿ 🌸 ✿ 🌺";
            position: absolute;
            width: 110%;
            height: 110%;
            border-radius: 50%;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            word-spacing: 20px;
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .baby-photo {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 5px solid white;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            position: relative;
            z-index: 3;
            margin: 10px;
        }

        .baby-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .name-section {
            margin-top: 20px;
        }

        .baby-name {
            font-family: 'Great Vibes', cursive;
            font-size: 60px;
            color: var(--leaf-green);
            margin: 0;
        }

        .event-details {
            margin-top: 15px;
            color: var(--deep-red);
            font-weight: 600;
        }

        .date-row {
            font-size: 20px;
            border-top: 1px solid var(--gold);
            border-bottom: 1px solid var(--gold);
            display: inline-block;
            padding: 5px 20px;
            margin: 10px 0;
        }

        .location {
            font-size: 14px;
            color: #555;
            line-height: 1.5;
            margin-top: 10px;
        }

        .footer {
            margin-top: 30px;
            padding-bottom: 30px;
        }

        .rsvp {
            background-color: var(--leaf-green);
            color: white;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        /* Rice Bowl Icon at bottom */
        .rice-bowl {
            font-size: 30px;
            margin-top: 10px;
        }

    </style>
</head>
<body>

    <div class="card">
        <!-- Botanical Corner Elements -->
        <div class="corner-flower top-left">🌸🍃</div>
        <div class="corner-flower top-right">🌺🌿</div>
        <div class="corner-flower bottom-left">🌿🌺</div>
        <div class="corner-flower bottom-right">🍃🌸</div>

        <div class="header">
            <div class="parents-name">Kunal Chaudhary & Suruchi Dev</div>
            <div class="ceremony-title">Annaprashan Ceremony</div>
            <p style="font-size: 12px; font-style: italic; color: #777;">Invite you to share the joy of their son's first rice</p>
        </div>

        <!-- Photo with Floral Wreath -->
        <div class="photo-wreath">
            <div class="wreath-border"></div>
            <div class="baby-photo">
                <img src="yuvaan_pp.jpg" alt="Yuvaan">
            </div>
        </div>

        <div class="name-section">
            <h1 class="baby-name">Yuvaan</h1>
            <div class="event-details">
                <div class="date-row">7 Baisakh 2083</div>
                <div style="font-size: 14px;">(20 April 2026)</div>
                <div style="margin-top: 10px;">Monday | 4:00 PM Onwards</div>
            </div>
        </div>

        <div class="location">
            📍 <strong>At Our Residence</strong><br>
            Jorpati, Kathmandu, Nepal
        </div>

        <div class="footer">
            <div class="rice-bowl">🥣🥄</div>
            <div class="rsvp">RSVP: +977-9860332358</div>
            <p style="font-size: 11px; margin-top: 8px; color: #888;">Followed by Dinner</p>
        </div>
    </div>

</body>
</html>
