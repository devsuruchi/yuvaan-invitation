<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuvaan Annaprashan Invitation</title>
    <!-- html2canvas for downloading -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@400;500;700&family=Mukta:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy-bg: #0d2a4a;
            --cream-card: #f9f5eb;
            --gold: #bd9a5f;
            --maroon: #9e1b4a;
        }

        body {
            background-color: #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 0;
            margin: 0;
        }

        /* 1. OUTER NAVY BACKGROUND (Jasmine Floral Pattern) */
        #capture-area {
            width: 500px;
            height: 700px;
            background-color: var(--navy-bg);
            /* Simulating the white floral pattern from your image */
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(255,255,255,0.1) 1px, transparent 1px),
                url('https://www.transparenttextures.com/patterns/natural-paper.png');
            display: flex;
            justify-content: center;
            align-items: flex-end;
            position: relative;
            overflow: hidden;
        }

        /* Scalloped Arch Mask */
        .inner-card {
            width: 440px;
            height: 640px;
            background-color: var(--cream-card);
            background-image: url('https://www.transparenttextures.com/patterns/parchment.png');
            position: relative;
            z-index: 5;
            border: 2px solid var(--gold);
            /* The specific cloud/scalloped arch from your image */
            border-radius: 120px 120px 0 0;
            mask-image: radial-gradient(circle at 50% 0%, transparent 0, transparent 40px, black 41px);
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.3);
            padding-top: 40px;
        }

        /* Top Arch Scallops (CSS recreates the cloud shape) */
        .arch-top {
            position: absolute;
            top: -15px;
            width: 100%;
            height: 60px;
            background-image: radial-gradient(circle at 50% 100%, var(--cream-card) 40px, transparent 41px);
            background-size: 88px 60px;
            background-repeat: repeat-x;
        }

        /* Lotuses at the bottom corners - Exact placement */
        .lotus {
            position: absolute;
            width: 160px;
            bottom: -10px;
            z-index: 10;
        }
        .lotus-left { left: -10px; }
        .lotus-right { right: -10px; transform: scaleX(-1); }

        /* Typography Matching */
        .header-text {
            font-family: 'Playfair Display', serif;
            color: var(--navy-bg);
            font-size: 42px;
            margin: 0;
            font-weight: 900;
        }
        .ceremony-sub {
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 14px;
            color: var(--navy-bg);
            font-weight: 500;
            margin-top: -5px;
        }
        .invite-msg {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 12px;
            color: #444;
            text-align: center;
            margin: 20px 40px;
            line-height: 1.5;
        }
        .name-main {
            font-family: 'Montserrat', sans-serif;
            color: var(--maroon);
            font-size: 48px;
            font-weight: 700;
            margin: 5px 0;
            letter-spacing: 2px;
        }
        .nepali-name {
            font-family: 'Mukta', sans-serif;
            font-size: 22px;
            color: var(--navy-bg);
            margin-top: -10px;
        }

        /* Mandala Photo Frame */
        .photo-container {
            position: relative;
            width: 220px;
            height: 220px;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .mandala-svg {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.5;
            transform: rotate(45deg);
        }
        .baby-img {
            width: 145px;
            height: 145px;
            border-radius: 50%;
            object-fit: cover;
            z-index: 2;
            border: 1px solid var(--gold);
        }

        /* 84 Byanjan Implementation (Clear and Creative) */
        .bowls-wrap {
            position: absolute;
            width: 260px;
            height: 260px;
            z-index: 3;
        }
        .bowl {
            position: absolute;
            width: 12px;
            height: 9px;
            background: linear-gradient(to bottom, #bd9a5f, #7a5a1e);
            border-radius: 0 0 10px 10px;
            border: 0.5px solid #fff;
        }
        .food-dot {
            width: 60%;
            height: 3px;
            margin: 1px auto;
            border-radius: 50%;
        }

        /* Baby Graphic */
        .baby-icon {
            position: absolute;
            bottom: -25px;
            font-size: 35px;
            z-index: 10;
        }

        /* Details section */
        .footer-details {
            text-align: center;
            font-family: 'Montserrat', sans-serif;
            color: var(--navy-bg);
            margin-top: 25px;
            z-index: 6;
        }
        .date { font-weight: 700; font-size: 16px; margin-bottom: 5px; }
        .time { font-size: 14px; margin-bottom: 15px; color: #333; }
        .venue { font-size: 14px; font-weight: 500; color: var(--navy-bg); max-width: 200px; margin: 0 auto; line-height: 1.4; }

        .btn-download {
            margin-top: 30px;
            padding: 12px 25px;
            background-color: var(--maroon);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div id="capture-area">
        <!-- Pink Lotuses from your image -->
        <img src="https://images.vexels.com/media/users/3/145880/isolated/preview/83c83602f6b3992225a74e5488126c07-lotus-flower-bloom-illustration.png" class="lotus lotus-left">
        <img src="https://images.vexels.com/media/users/3/145880/isolated/preview/83c83602f6b3992225a74e5488126c07-lotus-flower-bloom-illustration.png" class="lotus lotus-right">

        <div class="inner-card">
            <div class="arch-top"></div>
            
            <h1 class="header-text">Annaprashan</h1>
            <p class="ceremony-sub">Ceremony</p>

            <p class="invite-msg">
                We cordially invite you to join us in celebrating<br>
                Annaprashan ceremony of our baby
            </p>

            <div class="nepali-name">अन्नप्राशन</div>
            <h2 class="name-main">YUVAAN</h2>

            <div class="photo-container">
                <!-- Mandala frame -->
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Mandala_pattern.svg/1024px-Mandala_pattern.svg.png" class="mandala-svg">
                
                <!-- Yuvaan's Photo -->
                <img src="yuvaan_pp.jpg" alt="Yuvaan" class="baby-img" onerror="this.src='https://api.dicebear.com/7.x/pixel-art/svg?seed=Baby';">
                
                <!-- 84 Byanjan Bowls in a circle -->
                <div class="bowls-wrap" id="bowls-container"></div>
                
                <!-- Baby Eating Graphic -->
                <div class="baby-icon">👶🥄</div>
            </div>

            <div class="footer-details">
                <div class="date">7 Baisakh, 2083</div>
                <div class="time">11 am | followed by lunch</div>
                <div class="venue">Jorpati, Kathmandu, Nepal</div>
            </div>
        </div>
    </div>

    <button class="btn-download" onclick="downloadImage()">Download Invitation</button>

    <script>
        // Javascript to generate 84 distinct bowls with different food colors
        const container = document.getElementById('bowls-container');
        const foodColors = ['#fdf0d5', '#ffcc33', '#cc3333', '#669933', '#ff9933'];
        
        for (let i = 0; i < 84; i++) {
            const bowl = document.createElement('div');
            bowl.className = 'bowl';
            
            // Positioning 84 bowls in two rings
            const ring = i < 42 ? 105 : 125;
            const angle = (i % 42) * (360 / 42);
            const x = 130 + ring * Math.cos(angle * Math.PI / 180) - 6;
            const y = 130 + ring * Math.sin(angle * Math.PI / 180) - 4;
            
            bowl.style.left = x + 'px';
            bowl.style.top = y + 'px';
            
            const food = document.createElement('div');
            food.className = 'food-dot';
            food.style.backgroundColor = foodColors[i % foodColors.length];
            bowl.appendChild(food);
            
            container.appendChild(bowl);
        }

        // Function to download the invite as a PNG
        function downloadImage() {
            const area = document.getElementById('capture-area');
            html2canvas(area, { 
                scale: 3, // High resolution
                useCORS: true,
                allowTaint: true 
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Yuvaan-Annaprashan-Invite.png';
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }
    </script>
</body>
</html>
