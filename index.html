<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuvaan's Artistic Pasni Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Marcellus&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #d32f2f;
            --marigold: #ff9800;
            --royal-blue: #1a237e;
            --emerald: #00695c;
            --gold-gradient: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --bg-gradient: radial-gradient(circle, #fff9e6, #ffecb3);
        }

        body {
            background-color: #222;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        /* The Main Artistic Canvas */
        .invitation-container {
            width: 100%;
            max-width: 500px;
            background: var(--bg-gradient);
            position: relative;
            border: 10px solid transparent;
            border-image: var(--gold-gradient) 1;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            text-align: center;
            overflow: hidden;
        }

        /* Background Mandalas */
        .mandala-bg {
            position: absolute;
            width: 300px;
            height: 300px;
            background: url('https://www.transparenttextures.com/patterns/mandala.png');
            opacity: 0.15;
            z-index: 0;
        }
        .m-top-left { top: -50px; left: -50px; transform: rotate(45deg); }
        .m-bottom-right { bottom: -50px; right: -50px; }

        /* Traditional Hanging Toran */
        .toran {
            position: absolute;
            top: 0;
            width: 100%;
            height: 60px;
            background-image: radial-gradient(circle, #ff9800 10px, #ff5722 11px, transparent 12px);
            background-size: 30px 30px;
            z-index: 5;
        }
        .toran::before {
            content: "🌿 🌸 🌿 🌸 🌿 🌸 🌿 🌸 🌿 🌸 🌿 🌸";
            display: block;
            font-size: 18px;
            margin-top: 5px;
        }

        /* HEAVY ARTISTIC PHOTO FRAME */
        .photo-section {
            position: relative;
            z-index: 2;
            margin-top: 80px;
        }

        .heavy-frame {
            width: 220px;
            height: 220px;
            margin: 0 auto;
            background: var(--gold-gradient);
            padding: 12px;
            border-radius: 50%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Ornamental Petals around Frame */
        .heavy-frame::before {
            content: "";
            position: absolute;
            width: 260px;
            height: 260px;
            border: 4px dotted var(--marigold);
            border-radius: 50%;
            animation: spin 15s linear infinite;
        }

        .photo-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: white;
            overflow: hidden;
            border: 4px solid var(--emerald);
        }

        .photo-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Typography Styles */
        .content {
            position: relative;
            z-index: 2;
            padding: 20px;
        }

        .header-text {
            font-family: 'Marcellus', serif;
            color: var(--primary-red);
            font-size: 30px;
            letter-spacing: 4px;
            margin: 10px 0;
            text-shadow: 1px 1px 0px #fff;
        }

        .invite-quote {
            font-size: 13px;
            font-style: italic;
            color: #555;
            margin-bottom: 5px;
        }

        .baby-name {
            font-family: 'Great Vibes', cursive;
            font-size: 68px;
            background: linear-gradient(to bottom, #1a237e, #00695c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 5px 0;
        }

        /* Event Details Box */
        .details-container {
            background: rgba(255, 255, 255, 0.7);
            border: 2px solid var(--marigold);
            border-radius: 15px;
            margin: 20px auto;
            padding: 15px;
            width: 85%;
            backdrop-filter: blur(5px);
        }

        .date-box {
            font-size: 20px;
            color: var(--primary-red);
            font-weight: 600;
        }

        .location {
            color: var(--emerald);
            font-weight: 600;
            display: block;
            margin-top: 10px;
        }

        .parents-info {
            margin-top: 20px;
            color: #444;
        }

        .parents-info strong {
            color: var(--royal-blue);
            font-size: 18px;
            display: block;
        }

        /* Footer Decoration */
        .footer-deco {
            background: var(--emerald);
            color: white;
            padding: 15px;
            margin-top: 20px;
            position: relative;
        }

        .footer-deco::before {
            content: "🥣 🥄 🥣";
            display: block;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .rsvp {
            font-size: 16px;
            font-weight: bold;
            color: var(--marigold);
        }

        /* Floating elements */
        .floating-element {
            position: absolute;
            z-index: 1;
            opacity: 0.6;
            filter: blur(1px);
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

    </style>
</head>
<body>

    <div class="invitation-container">
        <!-- Background Elements -->
        <div class="mandala-bg m-top-left"></div>
        <div class="mandala-bg m-bottom-right"></div>
        <div class="toran"></div>
        
        <!-- Floating Artistic Icons -->
        <div class="floating-element" style="top: 100px; left: 20px; font-size: 30px;">🌼</div>
        <div class="floating-element" style="top: 400px; right: 20px; font-size: 30px;">🌾</div>

        <div class="photo-section">
            <div class="heavy-frame">
                <div class="photo-inner">
                    <!-- YOUR SON'S PICTURE HERE -->
                    <img src="yuvaan_pp.jpg" alt="Yuvaan Chaudhary">
                </div>
            </div>
        </div>

        <div class="content">
            <div class="header-text">SHUBH PASNI</div>
            <p class="invite-quote">A handful of rice, a world of blessings.</p>
            
            <p style="margin-bottom: 0; color: #777;">Celebrating the Rice Feeding Ceremony of</p>
            <div class="baby-name">Yuvaan</div>

            <div class="details-container">
                <div class="date-box">7 Baisakh 2083</div>
                <div style="font-size: 14px; color: #444; font-weight: 600;">(Monday, 20 April 2026)</div>
                <div style="margin-top: 10px; font-size: 16px;">🕔 4:00 PM Onwards</div>
                <span class="location">📍 Jorpati, Kathmandu</span>
            </div>

            <div class="parents-info">
                Invited By:
                <strong>Kunal Chaudhary & Suruchi Dev</strong>
            </div>
        </div>

        <div class="footer-deco">
            <div class="rsvp">RSVP: +977-9860332358</div>
            <div style="font-size: 11px; margin-top: 5px; opacity: 0.8;">Join us for a joyful evening and dinner</div>
        </div>
    </div>

</body>
</html>
