<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuvaan's Annaprashan Invitation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #132b4f;
            --gold: #b99955;
            --pink: #e572a1;
            --cream: #f4eee0;
        }

        body {
            background-color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            font-family: 'Mukta', sans-serif;
        }

        /* The Main Invite Card */
        #invite-card {
            width: 500px;
            height: 700px;
            background-color: var(--navy);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Floral Background Pattern */
        .floral-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/floral-paper.png');
            opacity: 0.2;
        }

        /* The Scalloped Arch (Cream Paper) */
        .arch-container {
            width: 92%;
            height: 94%;
            background-color: var(--cream);
            background-image: url('https://www.transparenttextures.com/patterns/old-map.png'); /* Texture */
            position: relative;
            z-index: 10;
            clip-path: polygon(0% 15%, 5% 12%, 10% 15%, 15% 10%, 20% 15%, 25% 10%, 30% 15%, 35% 10%, 40% 15%, 45% 10%, 50% 15%, 55% 10%, 60% 15%, 65% 10%, 70% 15%, 75% 10%, 80% 15%, 85% 10%, 90% 15%, 95% 12%, 100% 15%, 100% 100%, 0% 100%);
            border: 4px solid var(--gold);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 60px;
        }

        /* Lotus Flowers (SVG) */
        .lotus {
            position: absolute;
            width: 150px;
            bottom: -10px;
            z-index: 20;
        }
        .lotus-left { left: -20px; }
        .lotus-right { right: -20px; transform: scaleX(-1); }

        /* Typography */
        .ann-text {
            font-family: 'Playfair Display', serif;
            color: var(--navy);
            font-size: 32px;
            font-weight: 700;
            margin: 0;
            line-height: 1;
        }
        .ceremony-text {
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 14px;
            color: var(--navy);
            margin-bottom: 15px;
        }
        .invite-msg {
            font-style: italic;
            font-size: 11px;
            color: #555;
            text-align: center;
            line-height: 1.4;
            margin-bottom: 20px;
        }
        .name-nepali {
            font-size: 24px;
            color: var(--navy);
            font-weight: 800;
            margin: 0;
        }
        .name-main {
            font-size: 50px;
            color: #b32a56; /* Deep pink/red from image */
            font-weight: 900;
            text-transform: uppercase;
            margin: -10px 0 10px 0;
            letter-spacing: 2px;
        }

        /* Photo & Mandala */
        .photo-section {
            position: relative;
            width: 220px;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .mandala {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.4;
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Mandala_pattern.svg/1024px-Mandala_pattern.svg.png');
            background-size: contain;
        }
        .baby-photo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid white;
            object-fit: cover;
            z-index: 5;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* The 84 Byanjan (Bowls) */
        .feast-container {
            position: absolute;
            width: 260px;
            height: 260px;
            top: -20px;
        }
        .bowl {
            position: absolute;
            width: 14px;
            height: 10px;
            background: linear-gradient(to bottom, #ffd700, #b28d42); /* Brass color */
            border-radius: 0 0 10px 10px;
            border: 1px solid #7a5a1e;
        }

        /* Baby Graphic (Kid trying to eat) */
        .baby-character {
            position: absolute;
            bottom: -30px;
            font-size: 40px;
            z-index: 30;
        }

        /* Details */
        .details {
            text-align: center;
            color: var(--navy);
            margin-top: 10px;
            font-weight: 700;
        }
        .date { font-size: 18px; margin-bottom: 2px; }
        .time { font-size: 14px; margin-bottom: 10px; font-weight: 400; }
        .venue { font-size: 14px; color: #666; font-weight: 400; }

        /* Button Style */
        .download-btn {
            margin-top: 30px;
            padding: 15px 30px;
            background-color: var(--gold);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div id="invite-card">
        <div class="floral-bg"></div>

        <!-- Lotus Images (Bottom corners) -->
        <img src="https://images.vexels.com/media/users/3/145880/isolated/preview/83c83602f6b3992225a74e5488126c07-lotus-flower-bloom-illustration.png" class="lotus lotus-left">
        <img src="https://images.vexels.com/media/users/3/145880/isolated/preview/83c83602f6b3992225a74e5488126c07-lotus-flower-bloom-illustration.png" class="lotus lotus-right">

        <div class="arch-container">
            <h1 class="ann-text">Annaprashan</h1>
            <p class="ceremony-text">Ceremony</p>

            <p class="invite-msg">
                We cordially invite you to join us in celebrating<br>
                Annaprashan ceremony of our baby
            </p>

            <h2 class="name-nepali">अन्नप्राशन</h2>
            <h1 class="name-main">YUVAAN</h1>

            <div class="photo-section">
                <div class="mandala"></div>
                <!-- MAKE SURE IMAGE IS IN SAME FOLDER -->
                <img src="yuvaan_pp.jpg" alt="Yuvaan" class="baby-photo" onerror="this.src='https://api.dicebear.com/7.x/pixel-art/svg?seed=Baby';">
                
                <!-- 84 Bowls -->
                <div class="feast-container" id="feast-orbit"></div>
                
                <!-- Kid graphic -->
                <div class="baby-character">👶🥄🥘</div>
            </div>

            <div class="details">
                <div class="date">7 Baisakh 2083 | 20th April, 2026</div>
                <div class="time">11:00 am | followed by lunch</div>
                <div class="venue">Jorpati, Kathmandu</div>
            </div>
        </div>
    </div>

    <button class="download-btn" onclick="downloadInvite()">Download Invitation as Image</button>

    <script>
        // Generate 84 small bowls for the feast
        const orbit = document.getElementById('feast-orbit');
        const colors = ['#fde047', '#ef4444', '#ffffff', '#22c55e', '#f97316'];
        
        for (let i = 0; i < 84; i++) {
            const bowl = document.createElement('div');
            bowl.className = 'bowl';
            
            // Logic to arrange 84 bowls in two rings
            const radius = i < 42 ? 100 : 125;
            const count = i < 42 ? 42 : 42;
            const angle = (i % 42 / 42) * 360;
            
            const x = 130 + radius * Math.cos(angle * Math.PI / 180) - 7;
            const y = 130 + radius * Math.sin(angle * Math.PI / 180) - 5;
            
            bowl.style.left = x + 'px';
            bowl.style.top = y + 'px';
            
            // Food color
            const food = document.createElement('div');
            food.style.width = '70%'; food.style.height = '4px';
            food.style.background = colors[i % colors.length];
            food.style.margin = '0 auto'; food.style.borderRadius = '50%';
            bowl.appendChild(food);

            orbit.appendChild(bowl);
        }

        // Function to download the invite
        function downloadInvite() {
            const invite = document.getElementById('invite-card');
            html2canvas(invite, { useCORS: true, scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Yuvaan_Annaprashan_Invite.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
</body>
</html>
