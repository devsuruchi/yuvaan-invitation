<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuvaan's Floral Annaprashan Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@700&family=Cinzel:wght@600&family=Marcellus&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-red: #b32d2e;
            --name-green: #2d5a27;
            --gold: #d4af37;
            --cream-bg: #fffcf5;
        }

        body {
            background-color: #2c3e50;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Marcellus', serif;
        }

        /* Main Invitation Canvas */
        .card {
            width: 500px;
            height: 750px;
            background-color: var(--cream-bg);
            /* Flowery Background Pattern */
            background-image: 
                url('https://www.transparenttextures.com/patterns/natural-paper.png'),
                url('https://img.freepik.com/free-vector/hand-painted-watercolor-floral-background_23-2148438595.jpg?size=626&ext=jpg'); /* Watercolor flower base */
            background-size: cover;
            background-position: center;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 8px solid white;
            outline: 2px solid var(--gold);
            outline-offset: -10px;
        }

        /* Marigold Garland (Toran) at the top */
        .toran {
            position: absolute;
            top: 0;
            width: 100%;
            height: 60px;
            display: flex;
            justify-content: center;
            gap: 10px;
            z-index: 10;
        }
        .marigold {
            width: 25px;
            height: 25px;
            background: radial-gradient(circle, #ffeb3b, #ff9800);
            border-radius: 50%;
            box-shadow: 0 4px 0 #d32f2f;
        }

        /* Content Positioning */
        .content {
            position: relative;
            z-index: 5;
            text-align: center;
            padding-top: 60px;
        }

        .hosts {
            color: var(--text-red);
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .solicit {
            font-size: 11px;
            letter-spacing: 1.5px;
            color: #555;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* Flowery Child Name */
        .child-name {
            font-family: 'Great Vibes', cursive;
            color: var(--name-green);
            font-size: 75px;
            margin: 10px 0;
            filter: drop-shadow(2px 2px 2px rgba(255,255,255,0.8));
        }

        .ceremony-title {
            font-family: 'Cinzel', serif;
            color: var(--text-red);
            font-size: 26px;
            letter-spacing: 2px;
            margin-top: -15px;
        }

        /* The Date Section with Gold Bars */
        .date-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 25px 0;
            color: var(--text-red);
        }
        .date-side {
            font-size: 16px;
            font-weight: bold;
        }
        .date-center {
            font-size: 34px;
            font-weight: 800;
            border-left: 3px double var(--gold);
            border-right: 3px double var(--gold);
            padding: 0 20px;
        }

        /* Left Side Info & Right Side Image */
        .bottom-layout {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 30px;
            margin-top: 10px;
        }

        .info-block {
            text-align: left;
            width: 50%;
            color: var(--text-red);
            margin-bottom: 50px;
        }

        .time {
            font-size: 22px;
            font-weight: bold;
        }

        .location-box {
            font-size: 14px;
            color: #333;
            font-weight: 600;
            margin-top: 15px;
            line-height: 1.4;
        }

        /* SON'S PICTURE (Artistic Integration) */
        .yuvaan-photo-container {
            width: 280px;
            position: absolute;
            bottom: 30px;
            right: -20px;
        }

        .yuvaan-photo-container img {
            width: 100%;
            mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
        }

        /* Rice Bowl Overlay at bottom left */
        .rice-bowl {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 150px;
            z-index: 6;
        }

        .footer-rsvp {
            position: absolute;
            bottom: 15px;
            width: 100%;
            text-align: center;
            font-size: 13px;
            font-weight: bold;
            color: var(--text-red);
            background: rgba(255,255,255,0.4);
            padding: 5px 0;
        }

        /* Corner Floral Overlay (Extra Flowery) */
        .flower-overlay {
            position: absolute;
            width: 200px;
            opacity: 0.9;
            pointer-events: none;
        }
        .top-left-flowers { top: -20px; left: -20px; }
        .bottom-left-flowers { bottom: -20px; left: -20px; transform: rotate(270deg); }

    </style>
</head>
<body>

    <div class="card">
        <!-- Flowery Background Corners -->
        <img src="https://i.imgur.com/8Y0S09b.png" class="flower-overlay top-left-flowers">
        
        <!-- Traditional Marigolds -->
        <div class="toran">
            <div class="marigold"></div><div class="marigold"></div><div class="marigold"></div>
            <div class="marigold"></div><div class="marigold"></div><div class="marigold"></div>
            <div class="marigold"></div><div class="marigold"></div><div class="marigold"></div>
        </div>

        <div class="content">
            <div class="hosts">Kunal Chaudhary & Suruchi Dev</div>
            <div class="solicit">Solicit your presence at the<br>auspicious occasion of their little son</div>
            
            <div class="child-name">Yuvaan</div>
            <div class="ceremony-title">ANNAPRASHAN CEREMONY</div>

            <!-- Date Section -->
            <div class="date-section">
                <div class="date-side">7 BAISAKH</div>
                <div class="date-center">2083</div>
                <div class="date-side">20 APRIL 2026</div>
            </div>
            <div style="font-weight: bold; color: var(--text-red); margin-top: -20px; letter-spacing: 2px;">MONDAY</div>

            <!-- Bottom Left Info -->
            <div class="bottom-layout">
                <div class="info-block">
                    <div class="time">4:00 PM Onwards</div>
                    <div style="font-weight: bold; margin-bottom: 10px;">Followed by Dinner</div>
                    
                    <div class="location-box">
                        📍 At Our Residence,<br>
                        Jorpati, Kathmandu,<br>
                        Nepal
                    </div>
                </div>
            </div>
        </div>

        <!-- YUVAAN'S PICTURE -->
        <div class="yuvaan-photo-container">
            <!-- Ensure your photo yuvaan_pp.jpg is in the same folder as this code -->
            <img src="yuvaan_pp.jpg" alt="Yuvaan">
        </div>

        <!-- Traditional Silver Rice Bowl -->
        <div class="rice-bowl">
            <img src="https://i.imgur.com/6X2f7pU.png" style="width: 100%;" alt="Bowl">
        </div>

        <div class="footer-rsvp">
            RSVP: +977-9860332358
        </div>
    </div>

</body>
</html>
