<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuvaan's Annaprashan Invitation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #1e293b;
            --maroon: #800000;
            --gold: #b28d42;
        }

        body {
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Mukta', sans-serif;
        }

        /* The Card Container - 9:16 aspect ratio */
        .card {
            width: 400px;
            height: 700px;
            background: #fdfaf1; /* Parchment Color */
            position: relative;
            overflow: hidden;
            border: 4px solid var(--gold);
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        /* The Traditional Arch Frame (Matching your photo) */
        .arch-header {
            width: 100%;
            height: 120px;
            background-color: var(--navy);
            background-image: url('https://www.transparenttextures.com/patterns/floral-paper.png');
            clip-path: ellipse(80% 100% at 50% 0%);
            position: absolute;
            top: 0;
            z-index: 10;
            border-bottom: 4px solid var(--gold);
        }

        /* Parchment Texture Overlay */
        .parchment {
            position: absolute;
            inset: 0;
            opacity: 0.2;
            background-image: url('https://www.transparenttextures.com/patterns/old-map.png');
            pointer-events: none;
        }

        /* Pink Lotus Elements (Matching your photo) */
        .lotus {
            position: absolute;
            width: 100px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2));
            z-index: 5;
            bottom: 120px;
            animation: sway 4s ease-in-out infinite;
        }
        .lotus-left { left: -20px; transform: rotate(-15deg); }
        .lotus-right { right: -20px; transform: rotate(15deg); scaleX(-1); }

        @keyframes sway {
            0%, 100% { transform: translateY(0) rotate(-15deg); }
            50% { transform: translateY(-10px) rotate(-10deg); }
        }

        /* Photo Frame & 84 Bowls Orbit */
        .photo-area {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 180px auto 20px;
            z-index: 20;
        }

        .main-photo {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 6px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover;
            z-index: 25;
        }

        /* 84 Taparis (Leaf Bowls) */
        .tapari {
            position: absolute;
            width: 14px;
            height: 10px;
            background: #3e5c36; /* Tapari Green */
            border-radius: 0 0 10px 10px;
            border: 1px solid #FFD700;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }

        .orbit-container {
            position: absolute;
            inset: 0;
            animation: rotate 60s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Baby Graphic (Creative representation) */
        .baby-character {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3rem;
            animation: bounce 2s infinite;
            z-index: 30;
        }

        @keyframes bounce {
            0%, 100% { bottom: -30px; }
            50% { bottom: -20px; }
        }

        /* Text Styles */
        .ceremony-title {
            font-family: 'Playfair Display', serif;
            letter-spacing: 4px;
            color: var(--navy);
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .nepali-subha {
            font-family: 'Mukta', sans-serif;
            color: var(--maroon);
            font-size: 2.2rem;
            font-weight: 800;
            margin-top: 10px;
        }

        .yuvaan-name {
            color: var(--maroon);
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 2px;
            margin: -5px 0 10px;
        }

        .details-box {
            margin-top: 60px;
            color: var(--navy);
            font-weight: 700;
            text-align: center;
        }

        /* Floating Flowers (GIF Effect) */
        .petal {
            position: absolute;
            background: #fbbf24;
            width: 10px; height: 10px;
            border-radius: 50% 0 50% 0;
            animation: fall linear infinite;
            z-index: 100;
        }

        @keyframes fall {
            0% { top: -20px; transform: rotate(0); opacity: 1; }
            100% { top: 720px; transform: rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="petals"></div>

    <div class="card">
        <div class="parchment"></div>
        <div class="arch-header"></div>

        <!-- Lotuses (Matching Pragya's Invite) -->
        <img src="https://cdn-icons-png.flaticon.com/512/1043/1043425.png" class="lotus lotus-left" alt="lotus">
        <img src="https://cdn-icons-png.flaticon.com/512/1043/1043425.png" class="lotus lotus-right" alt="lotus">

        <!-- Top Header Text -->
        <div class="text-center pt-14 relative z-20">
            <p class="ceremony-title">Annaprashan <span class="text-xs italic block">Ceremony</span></p>
            <h2 class="nepali-subha">शुभ अन्नप्राशन</h2>
            <h1 class="yuvaan-name">YUVAAN</h1>
            <p class="text-xs text-slate-500 italic">We cordially invite you to join us in celebrating <br> Annaprashan of our baby</p>
        </div>

        <!-- The Photo & 84 Bowls (The Creative Feast) -->
        <div class="photo-area">
            <div id="bowl-orbit" class="orbit-container"></div>
            <img src="yuvaan_pp.jpg" alt="Yuvaan" class="main-photo" onerror="this.src='https://api.dicebear.com/7.x/pixel-art/svg?seed=Yuvaan';">
            
            <!-- Graphical representation of kid trying to eat -->
            <div class="baby-character">👶🥣</div>
        </div>

        <!-- Footer Details (Matching Pragya's Layout) -->
        <div class="details-box px-8">
            <div class="text-lg font-black border-t border-b border-gold py-2">
                7th Baisakh, 2083
            </div>
            <div class="text-sm mt-2 uppercase tracking-widest text-slate-600">
                11 AM | followed by lunch
            </div>
            <div class="mt-4 text-xs text-slate-500 tracking-wider">
                📍 Jorpati, Kathmandu <br>
                <span class="text-[10px] mt-1 block">CELEBRATING CHAURASI BYANJAN</span>
            </div>
        </div>

        <!-- RSVP Button -->
        <div class="absolute bottom-6 w-full text-center z-50">
            <button onclick="window.open('https://wa.me/?text=Blessings+to+Yuvaan!')" class="bg-[#800000] text-white px-8 py-2 rounded-full text-[10px] font-bold uppercase tracking-[0.3em] shadow-lg">
                Send Blessings
            </button>
        </div>
    </div>

    <script>
        // Generate 84 Taparis (Small Bowls) for Chaurasi Byanjan
        const orbit = document.getElementById('bowl-orbit');
        const foods = ['#fde047', '#ef4444', '#ffffff', '#22c55e', '#f97316'];
        
        for (let i = 0; i < 84; i++) {
            const tapari = document.createElement('div');
            tapari.className = 'tapari';
            const angle = (i / 84) * 360;
            const radius = 105;
            const x = 110 + radius * Math.cos(angle * Math.PI / 180) - 7;
            const y = 110 + radius * Math.sin(angle * Math.PI / 180) - 5;
            tapari.style.left = `${x}px`;
            tapari.style.top = `${y}px`;
            
            // Random food color inside
            const food = document.createElement('div');
            food.style.width = '60%'; food.style.height = '60%';
            food.style.margin = '20% auto'; food.style.borderRadius = '50%';
            food.style.backgroundColor = foods[i % foods.length];
            tapari.appendChild(food);
            
            orbit.appendChild(tapari);
        }

        // Falling Petals Animation
        const petalContainer = document.getElementById('petals');
        function createPetal() {
            const p = document.createElement('div');
            p.className = 'petal';
            p.style.left = Math.random() * window.innerWidth + 'px';
            p.style.animationDuration = (Math.random() * 3 + 2) + 's';
            p.style.background = ['#fbbf24', '#f59e0b', '#fb7185'][Math.floor(Math.random()*3)];
            petalContainer.appendChild(p);
            setTimeout(() => p.remove(), 5000);
        }
        setInterval(createPetal, 300);
    </script>
</body>
</html>
