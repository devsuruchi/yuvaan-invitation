<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuvaan's Royal Pasni Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-teal: #004d4d;
            --royal-gold: #c5a059;
            --bright-gold: #f9d976;
            --accent-orange: #e67e22;
            --off-white: #fffcf2;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Montserrat', sans-serif;
        }

        /* The Main Card */
        .card {
            background-color: var(--off-white);
            width: 100%;
            max-width: 480px;
            position: relative;
            border: 12px double var(--royal-gold);
            border-radius: 5px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            overflow: hidden;
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
        }

        /* Artistic Mandala Background Decals */
        .card::before {
            content: "";
            position: absolute;
            top: -100px;
            right: -100px;
            width: 250px;
            height: 250px;
            background: repeating-conic-gradient(from 0deg, var(--royal-gold) 0deg 10deg, transparent 10deg 20deg);
            opacity: 0.1;
            border-radius: 50%;
        }

        /* Heavy Ornamental Header */
        .header-deco {
            background: var(--deep-teal);
            color: var(--bright-gold);
            padding: 25px 10px;
            text-align: center;
            border-bottom: 5px solid var(--royal-gold);
        }

        .header-deco h2 {
            font-family: 'Cinzel', serif;
            margin: 0;
            font-size: 24px;
            letter-spacing: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        /* THE HEAVY ARTISTIC FRAME */
        .frame-wrapper {
            position: relative;
            width: 240px;
            height: 240px;
            margin: 40px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The Sunburst / Petal Layer */
        .outer-frame {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--royal-gold);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            animation: rotate 20s linear infinite;
            opacity: 0.8;
        }

        .inner-frame {
            position: absolute;
            width: 85%;
            height: 85%;
            background: linear-gradient(45deg, var(--royal-gold), var(--bright-gold));
            border-radius: 50%;
            border: 4px solid var(--deep-teal);
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.4);
        }

        .photo-box {
            width: 92%;
            height: 92%;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid white;
        }

        .photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Typography */
        .content {
            text-align: center;
            padding: 0 30px 40px;
        }

        .invitation-for {
            font-size: 14px;
            color: var(--deep-teal);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0;
        }

        .baby-name {
            font-family: 'Great Vibes', cursive;
            font-size: 65px;
            color: var(--accent-orange);
            margin: 0px 0 20px;
            filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.1));
        }

        .event-info {
            border: 1px solid var(--royal-gold);
            padding: 15px;
            position: relative;
            margin-bottom: 25px;
        }

        .event-info::after {
            content: "⬥";
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--off-white);
            padding: 0 10px;
            color: var(--royal-gold);
        }

        .date-time {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .location {
            color: var(--deep-teal);
            font-weight: 700;
            margin-top: 10px;
            display: block;
        }

        .parents {
            font-size: 15px;
            color: #555;
            line-height: 1.6;
        }

        .parents strong {
            color: #000;
            display: block;
            font-size: 17px;
        }

        .rsvp-footer {
            background: var(--deep-teal);
            color: white;
            padding: 15px;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .rsvp-footer strong {
            color: var(--bright-gold);
        }

    </style>
</head>
<body>

    <div class="card">
        <div class="header-deco">
            <h2>SHUBH PASNI</h2>
        </div>
        
        <div class="content">
            <p class="invitation-for">The First Rice Ceremony of</p>
            
            <!-- HEAVY ARTISTIC PHOTO FRAME -->
            <div class="frame-wrapper">
                <div class="outer-frame"></div>
                <div class="inner-frame">
                    <div class="photo-box">
                        <!-- Ensure yuvaan_pp.jpg is in the same folder -->
                        <img src="yuvaan_pp.jpg" alt="Yuvaan">
                    </div>
                </div>
            </div>

            <div class="baby-name">Yuvaan</div>

            <div class="event-info">
                <div class="date-time">
                    7 Baisakh 2083 <br>
                    <span style="font-size: 14px; color: #777;">(20 April 2026)</span><br>
                    4:00 PM Onwards
                </div>
                <span class="location">Jorpati, Kathmandu</span>
            </div>

            <div class="parents">
                Invited by:
                <strong>Kunal Chaudhary & Suruchi Dev</strong>
            </div>
        </div>

        <div class="rsvp-footer">
            RSVP: <strong>+977-9860332358</strong>
        </div>
    </div>

</body>
</html>
