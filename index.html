<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuvaan's Annaprashan GIF Invite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@800&family=Poppins:wght@400;900&display=swap" rel="stylesheet">
    <style>
        /* GIF-STYLE KEYFRAMES */
        @keyframes rotate-feast { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse-gold { 0%, 100% { text-shadow: 0 0 10px #FFD700, 0 0 20px #FFD700; } 50% { text-shadow: 0 0 30px #FFD700, 0 0 40px #FFD700; } }
        @keyframes baby-shake { 0%, 100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(-10px) rotate(5deg); } }
        @keyframes petal-fall { 0% { top: -10%; transform: rotate(0deg); } 100% { top: 110%; transform: rotate(360deg); } }
        @keyframes float-bowl { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }

        body {
            background: radial-gradient(circle, #4c0519 0%, #000000 100%);
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
        }

        /* The 84 Byanjan Bowls (Taparis) */
        .tapari {
            position: absolute;
            width: 14px;
            height: 10px;
            border-radius: 0 0 10px 10px;
            border: 1px solid #FFD700;
            box-shadow: 0 0 5px gold;
        }

        .sayapatri {
            position: absolute;
            color: #fbbf24;
            font-size: 20px;
            animation: petal-fall 5s linear infinite;
        }

        .annaprashan-text {
            font-family: 'Mukta', sans-serif;
            color: #FFD700;
            animation: pulse-gold 2s infinite ease-in-out;
        }
    </style>
</head>
<body>

    <!-- FALLING FLOWERS LAYER -->
    <div id="flowers"></div>

    <!-- MAIN CIRCULAR INVITATION -->
    <div class="relative w-[380px] h-[380px] flex items-center justify-center">
        
        <!-- OUTER RING: 84 BYANJAN LOOP -->
        <div id="orbit" class="absolute inset-0" style="animation: rotate-feast 25s linear infinite;"></div>

        <!-- MIDDLE RING: THE DATE & VENUE (Pulsing) -->
        <div class="absolute w-[300px] h-[300px] border-4 border-dashed border-amber-500/30 rounded-full animate-pulse"></div>

        <!-- CENTER: YUVAAN'S PHOTO FRAME -->
        <div class="relative z-20 w-52 h-52 rounded-full border-8 border-amber-500 p-2 bg-black shadow-[0_0_50px_rgba(251,191,36,0.5)]">
            <div class="w-full h-full rounded-full overflow-hidden">
                <img src="yuvaan_pp.jpg" alt="Yuvaan" class="w-full h-full object-cover" onerror="this.src='https://api.dicebear.com/7.x/pixel-art/svg?seed=Yuvaan';">
            </div>
        </div>

        <!-- BOTTOM ICON: CUTE BABY GRAPHIC -->
        <div class="absolute -bottom-8 z-30 flex flex-col items-center" style="animation: baby-shake 3s infinite ease-in-out;">
            <div class="text-6xl mb-1">👶</div>
            <div class="bg-amber-600 text-white px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest border-2 border-white shadow-lg">
                5 Months Old
            </div>
        </div>
    </div>

    <!-- TEXT CONTENT OVERLAY (Bottom) -->
    <div class="fixed bottom-10 left-0 w-full text-center px-6 z-40">
        <h1 class="annaprashan-text text-7xl font-black mb-2">अन्नप्राशन</h1>
        <p class="text-amber-400 font-bold tracking-[0.2em] text-sm uppercase mb-4">Yuvaan's Weaning Ceremony</p>
        
        <div class="flex flex-col items-center gap-2">
            <div class="bg-white/10 backdrop-blur-md px-6 py-3 rounded-2xl border border-white/20 shadow-xl">
                <span class="text-white font-black text-xl">7 Baisakh 2083</span>
                <span class="text-amber-500 mx-2">|</span>
                <span class="text-white/80 text-sm">20th April 2026</span>
            </div>
            
            <p class="text-amber-200 text-xs font-bold flex items-center gap-2">
                📍 Jorpati, Kathmandu • Chaurasi Byanjan Feast
            </p>
        </div>

        <button onclick="location.href='https://wa.me/?text=Blessings+to+Yuvaan!'" class="mt-8 bg-amber-500 text-maroon-900 px-10 py-3 rounded-full font-black text-xs uppercase tracking-widest shadow-2xl transform active:scale-95 transition-all">
            Send Blessings
        </button>
    </div>

    <script>
        // Generate 84 Taparis (Bowls) in a Circle
        const orbit = document.getElementById('orbit');
        const colors = ['#fde047', '#f97316', '#ef4444', '#ffffff', '#22c55e', '#cd7f32'];
        
        for (let i = 0; i < 84; i++) {
            const bowl = document.createElement('div');
            bowl.className = 'tapari';
            
            const angle = (i / 84) * 360;
            const radius = 175; // The radius of the food galaxy
            const x = 190 + radius * Math.cos(angle * Math.PI / 180) - 7;
            const y = 190 + radius * Math.sin(angle * Math.PI / 180) - 5;
            
            bowl.style.left = `${x}px`;
            bowl.style.top = `${y}px`;
            bowl.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            
            // Random floating animation for each bowl
            bowl.style.animation = `float-bowl ${Math.random() * 2 + 1}s infinite ease-in-out`;
            
            orbit.appendChild(bowl);
        }

        // Generate Falling Flowers (Sayapatri)
        const flowers = document.getElementById('flowers');
        function createPetal() {
            const petal = document.createElement('div');
            petal.className = 'sayapatri';
            petal.innerHTML = '✿';
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.animationDuration = Math.random() * 3 + 2 + 's';
            flowers.appendChild(petal);
            setTimeout(() => petal.remove(), 5000);
        }
        setInterval(createPetal, 300);
    </script>
</body>
</html>
